<!DOCTYPE html>
<html>
    <head>
        <title>javascript in detail</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="container-fluid py-15">
            <h1>My magic lab</h1>
            <div class="card mb-4">
                <h3 class="card-title">data type </h3>
                <button class="btn btn-warning" onclick="checkdatatypes()">check data type</button>
                <div id="A" class="box p-3 mt-3 rounded"></div>
            </div>
            <div class="card mb-4">
                <h3 class="card-title">type conversion</h3>
                <input id="B" class="form-control mb-5" placeholder="enter a number">
                <button class="btn btn-danger" onclick="typeconversion()">turn into text</button>
                <div id="C" class="box p-3 mt-3 rounded"></div>
            </div>
            <div class="card mb-4">
                <h3 class="card-title">catch the mistake </h3>
                <input id="D" class="form-control mb-5" placeholder="enter a number">
                <button class="btn btn-dark" onclick="errorhandling()">divide</button>
                <div id="E" class="box p-3 mt-3 rounded"></div>
            </div>
            <div class="card mb-4">
                <h3 class="card-title">find and swap a word </h3>
                <input id="F" class="form-control mb-5" placeholder="enter a word to find">
                <input id="G" class="form-control mb-5" placeholder="enter a word to swap">
                <button class="btn btn-info mb-5">find</button>
                <button class="btn btn-info">replace</button>
                <div id="H" class="box p-3 mt-3 rounded"></div>
            </div>
        </div>
        <script src="thumb.js">
            </script>
    </body>
</html>
